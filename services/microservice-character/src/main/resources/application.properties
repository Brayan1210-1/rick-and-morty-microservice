spring.application.name=microservice-character

server.port=8081

#PRUEBA
#spring.profiles.active=dev

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=${DB_URL_CHARACTERS}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
eureka.client.service-url.defaultZone=${EUREKA_URL}


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.instance.prefer-ip-address=true


# Configuraciˇn de OpenFeign (Tiempos de espera)
spring.cloud.openfeign.client.config.default.connectTimeout=10000
 spring.cloud.openfeign.client.config.default.readTimeout=10000